name: Letisland
version: '${version}'

main: cn.lettle.letisland.Letisland
api-version: '26.2'
load: POSTWORLD

authors: [ Lettle ]
website: lettle.cn

commands:
  economy:
    description: 经济系统命令
    usage: /economy help
    aliases: [eco, money]
    permission: letisland.economy.use
  shop:
    description: 商店系统命令
    usage: /shop help
    aliases: [store]
    permission: letisland.shop.use
  generator:
    description: 刷石机系统命令
    usage: /generator help
    aliases: [gen]
    permission: letisland.generator.use
  fishing:
    description: 钓鱼科技系统命令
    usage: /fishing help
    aliases: [fish]
    permission: letisland.fishing.use
  title:
    description: 称号系统命令
    usage: /title help
    aliases: [titles]
    permission: letisland.title.use
  trash:
    description: 打开垃圾桶，取出被定时清理的世界掉落物
    usage: /trash
    permission: letisland.trash.use
  security:
    description: 安全防护系统命令（查看拦截状态、封禁/解封 IP）
    usage: /security status
    permission: letisland.security.admin
  homeland:
    description: 家园系统命令（创建家园、仓库、升级、设施）
    usage: /homeland help
    aliases: [hd]
    permission: letisland.homeland.use
  letisland:
    description: 插件管理与日志查询命令
    usage: /letisland log help
    permission: letisland.admin

permissions:
  # 经济系统权限
  letisland.economy.use:
    description: 允许使用经济系统基础命令
    default: true
  letisland.economy.balance.others:
    description: 允许查询其他玩家的余额
    default: op
  letisland.economy.admin:
    description: 允许管理经济系统（给予、扣除、设置、重载）
    default: op
  # 商店系统权限
  letisland.shop.use:
    description: 允许使用商店
    default: true
  letisland.shop.admin:
    description: 允许管理商店（手动刷新、热重载）
    default: op
  # 刷石机系统权限
  letisland.generator.use:
    description: 允许使用刷石机基础命令（查看、升级）
    default: true
  letisland.generator.admin:
    description: 允许管理刷石机（设置等级、热重载）
    default: op
  # 钓鱼系统权限
  letisland.fishing.use:
    description: 允许使用钓鱼系统（查看等级、升级、出售）
    default: true
  letisland.fishing.admin:
    description: 允许管理钓鱼系统（设置等级、热重载、开关）
    default: op
  # 称号系统权限
  letisland.title.use:
    description: 允许使用称号系统（查看图鉴、佩戴称号）
    default: true
  letisland.title.admin:
    description: 允许管理称号系统（热重载、开关）
    default: op
  # 垃圾桶系统权限
  letisland.trash.use:
    description: 允许打开垃圾桶取出被清理的掉落物
    default: true
  # 安全防护系统权限
  letisland.security.admin:
    description: 允许管理安全防护系统（查看状态、封禁/解封 IP、热重载、开关）
    default: op
  # 家园系统权限
  letisland.homeland.use:
    description: 允许使用家园系统（创建家园、仓库、设施）
    default: true
  letisland.homeland.admin:
    description: 允许管理家园系统（设置等级、强制拉入、热重载）
    default: op
  # 日志系统权限
  letisland.admin:
    description: 允许查询插件日志与管理插件
    default: op
