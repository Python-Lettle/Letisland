name: Letisland
version: '${version}'

main: cn.lettle.letisland.Letisland
api-version: '26.2'
load: POSTWORLD

authors: [ Lettle ]
website: lettle.cn

commands:
  economy:
    description: 经济系统命令
    usage: /economy help
    aliases: [eco, money]
    permission: letisland.economy.use
  shop:
    description: 商店系统命令
    usage: /shop help
    aliases: [store]
    permission: letisland.shop.use
  generator:
    description: 刷石机系统命令
    usage: /generator help
    aliases: [gen]
    permission: letisland.generator.use
  fishing:
    description: 钓鱼科技系统命令
    usage: /fishing help
    aliases: [fish]
    permission: letisland.fishing.use
  title:
    description: 称号系统命令
    usage: /title help
    aliases: [titles]
    permission: letisland.title.use

permissions:
  # 经济系统权限
  letisland.economy.use:
    description: 允许使用经济系统基础命令
    default: true
  letisland.economy.balance.others:
    description: 允许查询其他玩家的余额
    default: op
  letisland.economy.admin:
    description: 允许管理经济系统（给予、扣除、设置、重载）
    default: op
  # 商店系统权限
  letisland.shop.use:
    description: 允许使用商店
    default: true
  letisland.shop.admin:
    description: 允许管理商店（手动刷新、热重载）
    default: op
  # 刷石机系统权限
  letisland.generator.use:
    description: 允许使用刷石机基础命令（查看、升级）
    default: true
  letisland.generator.admin:
    description: 允许管理刷石机（设置等级、热重载）
    default: op
  # 钓鱼系统权限
  letisland.fishing.use:
    description: 允许使用钓鱼系统（查看等级、升级、出售）
    default: true
  letisland.fishing.admin:
    description: 允许管理钓鱼系统（设置等级、热重载、开关）
    default: op
  # 称号系统权限
  letisland.title.use:
    description: 允许使用称号系统（查看图鉴、佩戴称号）
    default: true
  letisland.title.admin:
    description: 允许管理称号系统（热重载、开关）
    default: op
