# Letisland 商店配置文件

settings:
  # 商店系统开关（管理员可通过 /shop enable|disable 切换）
  enabled: true
  # 商店随机刷新的购买物品数量（0-27）
  buy-slot-count: 27
  # 商店随机刷新的出售物品数量（0-18）
  sell-slot-count: 18
  # 自动刷新间隔（分钟）
  refresh-interval-minutes: 30

# 可购买物品池（商店会从中随机选择）
# material: 物品材质（参考 https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html）
# amount: 单次购买数量
# price: 购买价格
# weight: 随机权重（越大越容易被刷新到）
# display-name: 自定义显示名称（可选）
buy-items:
