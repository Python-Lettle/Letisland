# 钓鱼时的额外奖励概率
fishing-rewards:
  # 钓到自定义鱼的概率（否则钓到原版物品）
  custom-fish-chance: 0.70
  # 钓到经验值道具的概率
  exp-item-chance: 0.10
  # 触发buff的概率
  buff-chance: 0.2

# 经验值道具配置
exp-item:
  name: "钓鱼经验卷轴"
  material: PAPER
  # 每个道具给予的经验值范围
  min-exp: 10
  max-exp: 50

# BUFF配置
# type: GOOD(增益) / BAD(减益)
# effect: 药水效果名称
# duration: 持续时间（秒）
# amplifier: 效果等级（0开始）
# weight: 触发权重
buffs:
  regeneration:
    name: "生命恢复"
    type: GOOD
    effect: REGENERATION
    duration: 10
    amplifier: 1
    weight: 20.0
  saturation:
    name: "饱和"
    type: GOOD
    effect: SATURATION
    duration: 5
    amplifier: 0
    weight: 20.0
  speed:
    name: "速度提升"
    type: GOOD
    effect: SPEED
    duration: 30
    amplifier: 1
    weight: 15.0
  healing:
    name: "瞬间治疗"
    type: GOOD
    effect: HEAL
    duration: 1
    amplifier: 0
    weight: 15.0
  poison:
    name: "中毒"
    type: BAD
    effect: POISON
    duration: 8
    amplifier: 0
    weight: 15.0
  nausea:
    name: "反胃"
    type: BAD
