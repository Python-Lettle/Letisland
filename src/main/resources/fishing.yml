# Letisland 钓鱼科技配置文件

# 钓鱼系统开关
enabled: true

# 自动出售设置
auto-sell:
  # 是否允许玩家使用自动出售功能
  enabled: true
  # 默认自动出售等级（0=关闭，1-5=自动出售该等级及以下的鱼）
  # 玩家可通过 /fishing autosell <等级> 自行设置
  default-tier: 0

# 玩家钓鱼数据存储（由插件自动维护）
players: {}

# 钓鱼科技等级配置
# exp-to-next: 升到下一级所需经验值
# upgrade-cost: 升级需要消耗的材料
#   material: 物品材质
#   display-name: 显示名称（在GUI中展示给玩家）
#   amount: 数量
levels:
  1:
    name: "初级钓鱼"
    exp-to-next: 100
    upgrade-cost:
      - material: IRON_INGOT
        display-name: "铁锭"
        amount: 16
      - material: OAK_LOG
        display-name: "橡木原木"
        amount: 32
      - material: COBBLESTONE
        display-name: "圆石"
        amount: 64
  2:
    name: "中级钓鱼"
    exp-to-next: 300
    upgrade-cost:
      - material: IRON_INGOT
        display-name: "铁锭"
        amount: 64
      - material: OAK_LOG
        display-name: "橡木原木"
        amount: 64
      - material: COBBLESTONE
        display-name: "圆石"
        amount: 128
  3:
    name: "高级钓鱼"
    exp-to-next: 600
    upgrade-cost:
      - material: GOLD_INGOT
        display-name: "金锭"
        amount: 32
      - material: BIRCH_LOG
        display-name: "白桦原木"
        amount: 64
      - material: IRON_INGOT
        display-name: "铁锭"
        amount: 64
  4:
    name: "专家钓鱼"
    exp-to-next: 1200
    upgrade-cost:
      - material: DIAMOND
        display-name: "钻石"
        amount: 16
      - material: GOLD_INGOT
        display-name: "金锭"
        amount: 64
      - material: SPRUCE_LOG
        display-name: "云杉原木"
        amount: 64
  5:
    name: "大师钓鱼"
    exp-to-next: 0
    upgrade-cost: []

# 自定义鱼类配置
# tier: 鱼的等级（1-普通, 2-罕见, 3-稀有, 4-史诗, 5-传说）
# min-weight / max-weight: 重量范围（单位：公斤）
# base-value: 基础出售价格（实际价格 = base-value * weight）
# weight: 钓到此鱼的随机权重（玩家等级达到tier后才有概率钓到）
fish:
  # ===== 1级鱼（普通）=====
  sardine:
    name: "沙丁鱼"
    tier: 1
    material: COD
    min-weight: 0.1
    max-weight: 0.5
    base-value: 5.0
    weight: 40.0
