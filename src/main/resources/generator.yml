# Letisland 刷石机配置文件
# 全服共享的刷石机等级系统

# 刷石机系统开关（管理员可通过 /generator enable|disable 切换）
enabled: true

# 当前全服刷石机等级（由插件自动维护，请勿手动修改）
current-level: 1

# 等级配置
# level: 等级编号
# name: 等级名称
# upgrade-cost: 从上一级升级到本级的费用（等级1为初始等级，费用为0）
# replace-chance: 生成圆石时替换为矿物的概率（0.0 - 1.0）
# minerals: 矿物池配置
#   material: 物品材质
#   weight: 随机权重（触发替换时，按权重随机选择矿物）
levels:
  # ===== 等级1：初级刷石机（普通刷石机）=====
  1:
    name: "初级刷石机"
    upgrade-cost: 0
    replace-chance: 0.05
    minerals:
      coal_ore:
        material: COAL_ORE
        weight: 50.0
      copper_ore:
        material: COPPER_ORE
        weight: 30.0
      iron_ore:
        material: IRON_ORE
        weight: 20.0

  # ===== 等级2：进阶刷石机 =====
  2:
    name: "进阶刷石机"
    upgrade-cost: 5000.0
    replace-chance: 0.08
    minerals:
      coal_ore:
        material: COAL_ORE
        weight: 35.0
      copper_ore:
        material: COPPER_ORE
        weight: 25.0
      iron_ore:
        material: IRON_ORE
        weight: 25.0
      gold_ore:
        material: GOLD_ORE
        weight: 10.0
      redstone_ore:
        material: REDSTONE_ORE
        weight: 5.0

  # ===== 等级3：中级刷石机 =====
  3:
    name: "中级刷石机"
    upgrade-cost: 20000.0
    replace-chance: 0.10
    minerals:
      coal_ore:
        material: COAL_ORE
        weight: 25.0
      copper_ore:
        material: COPPER_ORE
        weight: 20.0
      iron_ore:
        material: IRON_ORE
        weight: 25.0
      gold_ore:
        material: GOLD_ORE
        weight: 15.0
      redstone_ore:
        material: REDSTONE_ORE
        weight: 8.0
      lapis_ore:
        material: LAPIS_ORE
        weight: 5.0
      nether_quartz_ore:
        material: NETHER_QUARTZ_ORE
        weight: 2.0

  # ===== 等级4：高级刷石机 =====
  4:
    name: "高级刷石机"
    upgrade-cost: 60000.0
    replace-chance: 0.12
    minerals:
      coal_ore:
        material: COAL_ORE
        weight: 20.0
      copper_ore:
        material: COPPER_ORE
        weight: 15.0
      iron_ore:
        material: IRON_ORE
        weight: 25.0
      gold_ore:
        material: GOLD_ORE
        weight: 15.0
      redstone_ore:
        material: REDSTONE_ORE
        weight: 8.0
